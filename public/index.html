<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LotoSmS</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#123c2f">
<link rel="apple-touch-icon" href="/icon.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1f1a;
    color: white;
}
#header {
    background: #123c2f;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
#logo { color: #00ff9c; font-weight: bold; }
#users { font-size: 14px; }
#auth, #chat { max-width: 700px; margin: 20px auto; }
input, button { padding: 5px; margin: 5px 0; }
#messages { list-style: none; padding: 10px; max-height: 60vh; overflow-y: auto; }
.message { margin: 5px; padding: 8px; border-radius: 10px; max-width: 70%; display: flex; align-items: center; }
.me { background: #00a86b; margin-left: auto; }
.other { background: #2f4f45; margin-right: auto; }
.message img { max-width: 150px; border-radius: 8px; margin-left: 5px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; margin-right: 5px; }
.time { font-size: 10px; opacity: 0.7; margin-left: auto; }
.status { font-size: 10px; opacity: 0.7; margin-left: 5px; }
#typing { font-size: 12px; color: gray; margin-top: 5px; }
</style>
</head>
<body>

<div id="header">
    <div id="logo">LotoSmS</div>
    <div id="users"></div>
</div>

<div id="auth">
    <h3>Регистрация / Логин</h3>
    <input id="username" placeholder="Ник" />

    <input id="password" type="password" placeholder="Пароль" />

    <input type="file" id="avatar" />

    <button id="registerBtn">Регистрация</button>
    <button id="loginBtn">Войти</button>
    <div id="authMsg"></div>
</div>

<div id="chat" style="display:none;">
    <ul id="messages"></ul>
    <div id="typing"></div>
    <form id="form">
        <input id="input" placeholder="Сообщение" />
        <input type="file" id="file" />
        <button>➤</button>
    </form>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let myUser = null;

// DOM элементы
const authDiv = document.getElementById("auth");
const chatDiv = document.getElementById("chat");
const usernameInput = document.getElementById("username");
const passwordInput = document.getElementById("password");
const avatarInput = document.getElementById("avatar");
const authMsg = document.getElementById("authMsg");

const form = document.getElementById("form");
const input = document.getElementById("input");
const fileInput = document.getElementById("file");
const messages = document.getElementById("messages");
const usersDiv = document.getElementById("users");
const typingDiv = document.getElementById("typing");

const registerBtn = document.getElementById("registerBtn");
const loginBtn = document.getElementById("loginBtn");

// Регистрация
registerBtn.addEventListener("click", async () => {
    const formData = new FormData();
    formData.append("username", usernameInput.value);
    formData.append("password", passwordInput.value);
    if (avatarInput.files[0]) formData.append("avatar", avatarInput.files[0]);

    const res = await fetch("/auth/register", { method: "POST", body: formData });
    const data = await res.json();
    if (data.success) {
        myUser = data.user;
        startChat();
    } else {
        authMsg.textContent = data.error;
    }
});

// Логин
loginBtn.addEventListener("click", async () => {
    const res = await fetch("/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value
        })
    });
    const data = await res.json();
    if (data.success) {
        myUser = data.user;
        startChat();
    } else {
        authMsg.textContent = data.error;
    }
});

// Инициализация чата после авторизации
function startChat() {
    authDiv.style.display = "none";
    chatDiv.style.display = "block";
    socket.emit("join", myUser.username);
}

// Socket.io события
socket.on("load messages", (msgs) => {


messages.innerHTML = "";
    msgs.forEach(m => addMessage(m));
});

socket.on("chat message", (msg) => addMessage(msg));
socket.on("image", (msg) => addMessage(msg));
socket.on("users", (users) => {
    usersDiv.textContent = "🟢 " + users.join(", ");
});

socket.on("typing", (u) => { typingDiv.textContent = u + " печатает..."; });
socket.on("stop typing", () => { typingDiv.textContent = ""; });

// Отправка сообщений
form.addEventListener("submit", (e) => {
    e.preventDefault();

    if (input.value) {
        socket.emit("chat message", { user: myUser.username, text: input.value });
        input.value = "";
    }

    const file = fileInput.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = () => {
            socket.emit("image", { user: myUser.username, image: reader.result });
        };
        reader.readAsDataURL(file);
        fileInput.value = "";
    }
    socket.emit("stop typing");
});

// Печатает
input.addEventListener("input", () => {
    socket.emit("typing", myUser.username);
    setTimeout(() => socket.emit("stop typing"), 1000);
});

// Добавление сообщений в чат
function addMessage(msg) {
    const li = document.createElement("li");
    li.className = "message " + (msg.User.username === myUser.username ? "me" : "other");

    const avatar = msg.User.avatar ? `<img src="${msg.User.avatar}" class="avatar">` : "";

    let content = msg.text ? msg.text : `<img src="${msg.image}">`;
    li.innerHTML = `
        ${avatar}<b>${msg.User.username}</b>: ${content}
        <div class="time">${msg.time}</div>
    `;
    messages.appendChild(li);
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
