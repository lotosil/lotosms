<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LotoSmS</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#123c2f">
<link rel="apple-touch-icon" href="/icon.png">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f1f1a;
    color: white;
}

#header {
    background: #123c2f;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}

#logo {
    color: #00ff9c;
    font-weight: bold;
}

#chat {
    max-width: 700px;
    margin: auto;
    height: 90vh;
    display: flex;
    flex-direction: column;
}

#messages {
    flex: 1;
    overflow-y: auto;
    list-style: none;
    padding: 10px;
}

.message {
    margin: 5px;
    padding: 8px;
    border-radius: 10px;
    max-width: 70%;
}

.me { background: #00a86b; margin-left: auto; }
.other { background: #2f4f45; }

.time { font-size: 10px; opacity: 0.7; }

.status { font-size: 10px; opacity: 0.7; }

img { max-width: 200px; border-radius: 8px; }

#form {
    display: flex;
    padding: 10px;
    background: #123c2f;
}

#form input { margin-right: 5px; padding: 5px; }

#typing { font-size: 12px; color: gray; }
</style>
</head>

<body>

<div id="header">
    <div id="logo">LotoSmS</div>
    <div id="users"></div>
</div>

<div id="chat">
    <ul id="messages"></ul>
    <div id="typing"></div>

    <form id="form">
        <input id="user" placeholder="Ник" required />
        <input id="input" placeholder="Сообщение" />
        <input type="file" id="file" />
        <button>➤</button>
    </form>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

const form = document.getElementById("form");
const input = document.getElementById("input");
const fileInput = document.getElementById("file");
const messages = document.getElementById("messages");
const userInput = document.getElementById("user");
const usersDiv = document.getElementById("users");
const typingDiv = document.getElementById("typing");
const sound = document.getElementById("sound");

let myName = "";

Notification.requestPermission();

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js');
}

userInput.addEventListener("change", () => {
    myName = userInput.value;
    socket.emit("join", myName);
});

socket.on("chat message", (msg) => {
    addMessage(msg);

    socket.emit("delivered", { id: msg.id, user: myName });

    setTimeout(() => {
        socket.emit("read", { id: msg.id, user: myName });
    }, 500);

    sound.play();
});

socket.on("image", (msg) => {
    addImage(msg);
    sound.play();
});

socket.on("message read", (msg) => {
    const el = document.getElementById("msg-" + msg.id);
    if (el) {
        const status = el.querySelector(".status");
        status.textContent = "✔✔ " + msg.read.join(", ");
    }
});

socket.on("users", (users) => {
    usersDiv.textContent = "🟢 " + users.join(", ");
});

socket.on("typing", (u) => {
    typingDiv.textContent = u + " печатает...";
});

socket.on("stop typing", () => {
    typingDiv.textContent = "";
});

form.addEventListener("submit", (e) => {
    e.preventDefault();

    if (input.value) {
        socket.emit("chat message", {
            user: myName,
            text: input.value
        });
        input.value = "";
    }

    const file = fileInput.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = () => {
            socket.emit("image", {
                user: myName,
                image: reader.result
            });
        };
        reader.readAsDataURL(file);
        fileInput.value = "";
    }

    socket.emit("stop typing");
});

input.addEventListener("input", () => {
    socket.emit("typing", myName);

    setTimeout(() => socket.emit("stop typing"), 1000);
});

function addMessage(msg) {
    const li = document.createElement("li");
    li.className = "message " + (msg.user === myName ? "me" : "other");
    li.id = "msg-" + msg.id;

    li.innerHTML= `
        <b>${msg.user}</b><
        ${msg.text}
        <div class="time">${msg.time}</div>
        <div class="status">✔ доставлено</div>
    `;

    messages.appendChild(li);
    messages.scrollTop = messages.scrollHeight;
}

function addImage(msg) {
    const li = document.createElement("li");
    li.className = "message " + (msg.user === myName ? "me" : "other");

    li.innerHTML = `
        <b>${msg.user}</b><
        <img src="${msg.image}">
        <div class="time">${msg.time}</div>
    `;

    messages.appendChild(li);
}
</script>

</body>
</html>
